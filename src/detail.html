<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/tailwind.css" />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="shortcut icon" href="icons/icon128.png" />
    <title>KPicker - 色の詳細</title>
  </head>
  <body class="min-h-screen bg-gray-50 p-6">
    <div class="max-w-md mx-auto">
      <a href="#" id="back-link" class="inline-flex items-center gap-2 text-sm text-gray-600 hover:text-gray-700 mb-6">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        戻る
      </a>
      <div id="color-detail-root" class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm">
        <div id="color-detail-swatch" class="color-detail-swatch rounded-xl mb-4 h-24"></div>
        <p id="color-detail-name" class="color-detail-name text-sm font-medium text-gray-700 mb-4 font-mono"></p>
        <div class="color-detail-formats space-y-2 mb-4">
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500 w-12 shrink-0">HEX</span>
            <div class="color-detail-input-wrap relative flex-1 min-w-0">
              <input type="text" id="color-detail-hex" readonly disabled class="color-detail-input w-full text-xs font-mono text-gray-800 bg-gray-50 border border-gray-200 rounded px-2 py-1.5 pr-9" />
              <button type="button" class="color-detail-copy absolute right-1 top-1/2 -translate-y-1/2 w-6 h-6 rounded flex items-center justify-center text-gray-500 hover:bg-gray-200/50 hover:text-gray-700" data-format="hex">
                <span class="color-detail-copy-icon" style="display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg></span>
              </button>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500 w-12 shrink-0">RGB</span>
            <div class="color-detail-input-wrap relative flex-1 min-w-0">
              <input type="text" id="color-detail-rgb" readonly disabled class="color-detail-input w-full text-xs font-mono text-gray-800 bg-gray-50 border border-gray-200 rounded px-2 py-1.5 pr-9" />
              <button type="button" class="color-detail-copy absolute right-1 top-1/2 -translate-y-1/2 w-6 h-6 rounded flex items-center justify-center text-gray-500 hover:bg-gray-200/50 hover:text-gray-700" data-format="rgb">
                <span class="color-detail-copy-icon" style="display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg></span>
              </button>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500 w-12 shrink-0">HSL</span>
            <div class="color-detail-input-wrap relative flex-1 min-w-0">
              <input type="text" id="color-detail-hsl" readonly disabled class="color-detail-input w-full text-xs font-mono text-gray-800 bg-gray-50 border border-gray-200 rounded px-2 py-1.5 pr-9" />
              <button type="button" class="color-detail-copy absolute right-1 top-1/2 -translate-y-1/2 w-6 h-6 rounded flex items-center justify-center text-gray-500 hover:bg-gray-200/50 hover:text-gray-700" data-format="hsl">
                <span class="color-detail-copy-icon" style="display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg></span>
              </button>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-gray-500 w-12 shrink-0">OKLCH</span>
            <div class="color-detail-input-wrap relative flex-1 min-w-0">
              <input type="text" id="color-detail-oklch" readonly disabled class="color-detail-input w-full text-xs font-mono text-gray-800 bg-gray-50 border border-gray-200 rounded px-2 py-1.5 pr-9" />
              <button type="button" class="color-detail-copy absolute right-1 top-1/2 -translate-y-1/2 w-6 h-6 rounded flex items-center justify-center text-gray-500 hover:bg-gray-200/50 hover:text-gray-700" data-format="oklch">
                <span class="color-detail-copy-icon" style="display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg></span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <p id="color-not-found" class="hidden text-sm text-gray-500 text-center py-8">色が見つかりません</p>
    </div>
    <script src="scripts/detail.js" defer></script>
  </body>
</html>
